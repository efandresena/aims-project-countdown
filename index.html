<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graduation Day</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
  <body>
  <div class="bg-layer" id="bgLayer"></div>
  <canvas id="matrixCanvas"></canvas>

  <div class="main-content">
    <h1 class="title">Graduation Day</h1>
    <p class="subtitle">Congratulations Class of 2026!</p>

    <div class="timer">
      <div class="time-block">
        <span class="time-value" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="time-value" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="time-value" id="minutes">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="time-value" id="seconds">00</span>
        <span class="time-label">Seconds</span>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText">0% complete</p>
    </div>

    <div class="reminder" id="reminder"></div>

    <div class="quotes-container">
      <div class="quote-box" id="motivationalBox">
        <p id="motivationalText"></p>
        <p id="motivationalAuthor"></p>
      </div>
    </div>
  </div>

  <div id="startOverlay" class="start-overlay">
    <div class="start-pulse">🎓 Click anywhere to start 🎓</div>
  </div>

  <audio id="bgMusic" preload="auto" loop playsinline style="display:none"></audio>

  <div class="message-feed" id="messageFeed">
    <div class="feed-title">🎓 Congratulations</div>
    <div class="feed-scroll" id="feedScroll"></div>
  </div>

  <button id="sendMsgBtn" class="send-btn">✍️</button>

  <div id="msgOverlay" class="overlay hidden">
    <div class="overlay-content">
      <h2>Send Your Congratulations!</h2>
      <input id="msgName" class="msg-input" placeholder="Your name" maxlength="50" />
      <textarea id="msgText" class="msg-textarea" placeholder="Write a message to your teacher, friends, or anyone you wish..." rows="3" maxlength="500"></textarea>
      <button id="submitMsg" class="btn">Send 💬</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
