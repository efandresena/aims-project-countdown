<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIMS Final Project - Countdown</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>

  <div class="main-content">
    <h1 class="title">AIMS Final Project</h1>
    <p class="subtitle">Countdown to June 11 &mdash; <span id="daysRemain"></span> days to go</p>

    <div class="timer">
      <div class="time-block">
        <span class="time-value" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="time-value" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="time-value" id="minutes">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="time-value" id="seconds">00</span>
        <span class="time-label">Seconds</span>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText">0% complete</p>
    </div>

    <div class="reminder" id="reminder"></div>

    <div class="quotes-container">
      <div class="quote-box" id="motivationalBox">
        <p id="motivationalText"></p>
        <p id="motivationalAuthor"></p>
      </div>
      <div class="quote-box" id="culturalBox">
        <p id="quoteLang" class="quote-lang"></p>
        <p id="quoteText"></p>
        <p id="quoteAuthor"></p>
      </div>
    </div>
  </div>

  <div id="reflectionOverlay" class="overlay hidden">
    <div class="overlay-content">
      <h2>Day <span id="overlayDay">1</span> Complete!</h2>
      <p>What have you done today? How is your research going?</p>
      <textarea id="dailyNote" placeholder="Write your reflection here..." rows="3"></textarea>
      <button id="saveNote" class="btn">Save & Continue</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
